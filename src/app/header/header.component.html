      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <!-- <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="#">Buy</a></li>

        <ul class="navbar-nav mx-auto">
          <li class="nav-item dropdown px-4" style="padding-left: 0 !important">
            <a
              class="nav-link dropdown-toggle p-0 hover:text-indigo-400 text-white"
              href="#"
              id="propertyTypeDropdown"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Property Types
              <i class="fas fa-angle-down ms-2 text-indigo-400"></i>
            </a>
            <ul
              class="dropdown-menu dropdown-menu-light rounded-xl shadow-lg"
              aria-labelledby="propertyTypeDropdown"
            >
              <li *ngFor="let type of propertyTypes">
                <a
                  class="dropdown-item"
                  href="javascript:void(0)"
                  (click)="goToSearch({ 'property-type': type.short_name })"
                  >{{ type.name }}</a
                >
              </li>
            </ul>
          </li>
          <li class="nav-item dropdown px-4">
            <a
              class="nav-link dropdown-toggle p-0 hover:text-indigo-400 text-white"
              href="#"
              id="priceRangeDropdown"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Price Range <i class="fas fa-angle-down ms-2 text-indigo-400"></i>
            </a>
            <ul
              class="dropdown-menu dropdown-menu-light rounded-xl shadow-lg"
              aria-labelledby="priceRangeDropdown"
            >
              <li *ngFor="let range of priceRanges">
                <a
                  class="dropdown-item"
                  href="javascript:void(0)"
                  (click)="goToSearch({ 'price-range': range.short_name })"
                  >{{ range.label }}</a
                >
              </li>
            </ul>
          </li>
          <li>
            <app-search
              [placeholder]="'Search'"
              [onlyInputSearch]="'yes'"
              ngModel="selectedOption"
              name="selectedOption"
              ngDefaultControl
              (selectionChange)="onSelectionChange($event)"
            ></app-search>
          </li>
        </ul>

        <div class="d-flex gap-2">
          <!-- <a class="btn btn-outline-warning">Advertise</a> -->
          <a
            *ngIf="isAuthenticated"
            class="btn btn-bordered"
            href="javascript:void()"
            routerLink="/seller"
            routerLinkActive="active"
            >Sell a Property</a
          >
          <a
            *ngIf="!isAuthenticated"
            class="btn btn-bordered"
            href="javascript:void()"
            (click)="openLogin()"
            >Sell a Property</a
          >
        </div>
        <div class="d-flex gap-2 position-relative">
          <a
            *ngIf="!isAuthenticated"
            class="btn btn-border text-white"
            href="javascript:void()"
            (click)="openLogin()"
            >Sign In</a
          >
          <a
            *ngIf="isAuthenticated"
            class="btn btn-border text-white"
            id="userDropdown"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            ><i class="fas fa-user"></i
          ></a>
          <ul
            *ngIf="isAuthenticated"
            class="dropdown-menu dropdown-menu-light rounded-xl shadow-lg"
            aria-labelledby="locationDropdown"
          >
            <li class="dropdown-item">
              <a class="nav-link" routerLink="/profile">Profile</a>
            </li>
            <li class="dropdown-item">
              <a class="nav-link" href="javascript:void()" (click)="logout()"
                >Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </div>
