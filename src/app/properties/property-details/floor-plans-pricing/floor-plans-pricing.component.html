<div *ngIf="units?.length" class="mt-4">
  <!-- Bootstrap Nav Tabs -->
  <ul class="nav nav-tabs">
    <li class="nav-item" *ngFor="let unit of units; let i = index">
      <button
        class="nav-link"
        [class.active]="activeIndex === i"
        (click)="selectTab(i)"
        type="button"
      >
        {{ unit.unitName }} BHK
      </button>
    </li>
  </ul>

  <!-- Tab Content -->
  <div class="card border-top-0">
    <div class="card-body" *ngIf="units[activeIndex] as unit">
      <div class="row align-items-center">
        <!-- Unit Details -->
        <div class="col-md-6">
          <h4 class="mb-3">{{ unit.unitName }} BHK</h4>

          <p class="mb-2">
            <strong>Price:</strong>
            ₹{{ unit.unitPrice }}
          </p>

          <p class="mb-2">
            <strong>Space:</strong>
            {{ unit.unitSpace }} sq.ft
          </p>
        </div>

        <!-- Floor Plan Image -->
        <div class="col-md-6 text-center">
          <img
            [src]="unit.unitFloorPlanUrl"
            alt="Floor Plan"
            class="img-fluid rounded shadow-sm"
            style="max-height: 400px"
          />
        </div>
      </div>
    </div>
  </div>
</div>
