<div class="row mt-4">
  <div class="col-6">
    <div class="row">
      <div class="col-6" *ngFor="let amenity of amenities">
        <div class="form-check">
          <input
            type="checkbox"
            checked
            class="form-check-input"
            name="amenities"
            value="amenity.id"
          />
          <label class="form-check-label">{{ amenity.name }}</label>
        </div>
      </div>
    </div>
  </div>
</div>
