<div class="container">
  <div class="relative mt-5 mb-5">
    <div class="row">
      <div class="col-md-12 col-md-offset-3">
        <h2 *ngIf="isLogin">Sign In</h2>
        <h2 *ngIf="!isLogin">Sign Up</h2>
        <app-loading *ngIf="isLoading"></app-loading>
        <div *ngIf="!isLoading">
          <form #authForm="ngForm" (ngSubmit)="onSubmit(authForm)">
            <div class="form-group mb-3" *ngIf="!isLogin">
              <label for="name">Name</label>
              <input
                type="text"
                id="name"
                class="form-control"
                ngModel
                required
                name="name"
              />
            </div>

            <div class="form-group mb-3" *ngIf="isLogin">
              <label for="email_phone">Email/Phone</label>
              <input
                type="text"
                id="text"
                class="form-control"
                ngModel
                required
                name="email_phone"
                minlength="5"
              />
            </div>
            <div class="form-group mb-3" *ngIf="!isLogin">
              <label for="email">Email</label>
              <input
                type="text"
                id="email"
                class="form-control"
                ngModel
                required
                name="email"
                minlength="5"
              />
            </div>
            <div class="form-group mb-3 otp-section" *ngIf="!isLogin">
              <label for="phone">Phone</label>
              <div class="d-flex gap-2">
                <input
                  type="text"
                  id="phone"
                  #phone
                  class="form-control"
                  ngModel
                  required
                  name="phone"
                  minlength="5"
                />
                <button
                  type="button"
                  class="btn btn-outline-primary"
                  (click)="sendOtp(phone.value)"
                  [disabled]="otpSent"
                >
                  Send OTP
                </button>
              </div>
            </div>
            <div class="form-group mb-3" *ngIf="otpSent">
              <label for="otp">Enter OTP</label>

              <div class="otp-boxes">
                <input
                  *ngFor="let digit of otpDigits; let i = index"
                  maxlength="1"
                  type="text"
                  class="otp-input"
                  (input)="onOtpInput($event, i)"
                  (keydown)="onKeyDown($event, i)"
                  (paste)="onPaste($event)"
                  #otpInput
                />
              </div>

              <div class="mt-2">
                <button
                  type="button"
                  class="btn btn-success"
                  (click)="verifyOtp()"
                  [disabled]="otp.length !== 4"
                >
                  Verify OTP
                </button>
              </div>

              <div class="otp-timer mt-2">
                <span *ngIf="countdown > 0">
                  Resend OTP in {{ countdown }}s
                </span>

                <button
                  *ngIf="countdown === 0"
                  class="btn btn-link"
                  type="button"
                  (click)="resendOtp()"
                >
                  Resend OTP
                </button>
              </div>
            </div>
            <div class="form-group mb-3">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                ngModel
                minlength="6"
                required
                class="form-control"
                name="password"
              />
              <a
                *ngIf="isLogin"
                href="javascript:void()"
                (click)="openForgotPasswordPage()"
                >Forgot Password?</a
              >
            </div>

            <div>
              <button
                class="btn btn-primary"
                type="submit"
                [disabled]="!authForm.valid || (!isLogin && !otpVerified)"
              >
                Submit
              </button>
            </div>
          </form>
        </div>
        <div *ngIf="isLogin">
          Don't have an account?
          <a href="javascript:void()" (click)="isLogin = false">Register</a>
        </div>
        <div *ngIf="!isLogin">
          Already have an account?
          <a href="javascript:void()" (click)="isLogin = true">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
